<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sin conexión</title>
    <style>
      :root { color-scheme: light; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
      .card { max-width: 520px; width: 100%; background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; }
      h1 { font-size: 18px; margin: 0 0 6px; }
      p { margin: 0; font-size: 14px; color: #475569; line-height: 1.5; }
      button { margin-top: 14px; height: 44px; padding: 0 14px; border-radius: 12px; border: 1px solid #e2e8f0; background: #0f172a; color: #fff; font-weight: 600; cursor: pointer; }
      button:active { transform: scale(0.98); }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Estás sin conexión</h1>
        <p>No pudimos cargar esta pantalla. Revisa tu conexión y vuelve a intentar.</p>
        <button onclick="location.reload()">Reintentar</button>
      </div>
    </div>
  </body>
</html>
